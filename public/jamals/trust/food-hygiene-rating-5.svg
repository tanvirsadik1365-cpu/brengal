  <rect width="280" height="140" fill="#98d414"/>
  <path d="M0 40h280M0 109h280" stroke="#050505" stroke-width="2"/>
  <rect y="109" width="280" height="31" fill="#050505"/>
  <text x="10" y="27" fill="#050505" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="800">FOOD HYGIENE RATING</text>
  <g font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="700" text-anchor="middle" dominant-baseline="central">
    <circle cx="28" cy="75" r="18" fill="none" stroke="#050505" stroke-width="2"/>
    <text x="28" y="76" fill="#050505">0</text>
    <circle cx="69" cy="75" r="18" fill="none" stroke="#050505" stroke-width="2"/>
    <text x="69" y="76" fill="#050505">1</text>
    <circle cx="110" cy="75" r="18" fill="none" stroke="#050505" stroke-width="2"/>
